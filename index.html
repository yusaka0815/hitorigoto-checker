<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>独り言チェッカー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    h1 { font-size: 1.4rem; margin-bottom: 4px; color: #a0c4ff; }
    .version { font-size: 0.7rem; color: #555; margin-bottom: 24px; }

    #status-circle {
      width: 160px; height: 160px;
      border-radius: 50%; border: 4px solid #444;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin-bottom: 32px;
      transition: background 0.2s, border-color 0.2s;
    }
    #status-circle.idle        { background: #2d2d4e; border-color: #555; }
    #status-circle.calibrating { background: #2d4a2d; border-color: #4caf50; }
    #status-circle.watching    { background: #1e3a5f; border-color: #2196f3; }
    #status-circle.detected    { background: #5f1e1e; border-color: #f44336; }

    #status-icon  { font-size: 3rem; }
    #status-label { font-size: 0.85rem; margin-top: 6px; color: #aaa; }

    #message {
      font-size: 1rem; text-align: center;
      min-height: 2.4em; margin-bottom: 28px;
      color: #ccc; line-height: 1.6;
    }

    #level-bar-wrap { width: 100%; max-width: 320px; margin-bottom: 8px; }
    #level-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
    #level-bar-bg { background: #333; border-radius: 4px; height: 10px; overflow: hidden; }
    #level-bar {
      height: 100%; width: 0%;
      background: #2196f3; border-radius: 4px;
      transition: width 0.1s, background 0.1s;
    }
    #level-bar.over { background: #f44336; }
    #threshold-info { font-size: 0.75rem; color: #666; margin-bottom: 28px; }

    button {
      padding: 14px 36px; font-size: 1rem;
      border: none; border-radius: 8px;
      cursor: pointer; background: #2196f3; color: #fff; margin: 6px;
    }
    button:disabled { background: #444; color: #777; cursor: default; }
    #stop-btn        { background: #f44336; }
    #recalibrate-btn { background: #555; font-size: 0.85rem; padding: 10px 24px; }
    #reset-btn       { background: #5a7a3a; font-size: 0.75rem; padding: 8px 18px; margin-top: 4px; }

    #sensitivity-wrap {
      width: 100%; max-width: 320px;
      margin-top: 20px; margin-bottom: 4px;
    }
    #sensitivity-wrap label {
      font-size: 0.8rem; color: #aaa;
      display: flex; justify-content: space-between; margin-bottom: 6px;
    }
    #sensitivity-wrap .ends {
      display: flex; justify-content: space-between;
      font-size: 0.7rem; color: #666; margin-top: 4px;
    }
    #sensitivity {
      width: 100%; accent-color: #2196f3;
    }
    #sensitivity-val { font-size: 0.75rem; color: #2196f3; margin-top: 4px; text-align: center; }

    #alert-count { margin-top: 16px; font-size: 0.85rem; color: #888; }
    #saved-info  { font-size: 0.72rem; color: #4a8; margin-top: 6px; }
    #debug-info  {
      margin-top: 12px; font-size: 0.7rem; color: #666;
      width: 100%; max-width: 320px; line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>独り言チェッカー</h1>
  <div class="version">v1.2.1</div>

  <div id="status-circle" class="idle">
    <div id="status-icon">🎤</div>
    <div id="status-label">待機中</div>
  </div>

  <div id="message">「開始」を押して<br>キャリブレーションを始めてください</div>

  <div id="level-bar-wrap">
    <div id="level-label">音量レベル</div>
    <div id="level-bar-bg"><div id="level-bar"></div></div>
  </div>
  <div id="threshold-info">閾値: —</div>

  <div id="sensitivity-wrap">
    <label>
      <span>感度調整</span>
    </label>
    <input type="range" id="sensitivity" min="1" max="7" step="1" value="4">
    <div class="ends"><span>鈍感（誤検知を減らす）</span><span>敏感（小声も検出）</span></div>
    <div id="sensitivity-val">標準</div>
  </div>

  <div>
    <button id="start-btn">開始</button>
    <button id="stop-btn" disabled>停止</button>
  </div>
  <button id="recalibrate-btn" disabled>再キャリブレーション</button>
  <button id="reset-btn">設定リセット</button>

  <div id="alert-count">アラート回数: 0</div>
  <div id="saved-info"></div>
  <div id="debug-info"></div>

<script>
// ---- 定数 ----
const NOISE_SEC         = 4;
const VOICE_SEC         = 4;
const SPEECH_HOLD_MS    = 1200;
const ALERT_COOLDOWN_MS = 5000;
const RECALIB_MS        = 60000;
const STORAGE_KEY       = 'hitorigoto_calib';
const SENSITIVITY_KEY   = 'hitorigoto_sensitivity';

// 感度スライダー値(1〜7) → 閾値への乗数
// 1(鈍感)=×2.0、4(標準)=×1.0、7(敏感)=×0.4
function sensitivityToMultiplier(v) {
  return 2.0 - (v - 1) * (1.6 / 6);
}

const SENSITIVITY_LABELS = {
  1: 'かなり鈍感', 2: '鈍感', 3: 'やや鈍感',
  4: '標準', 5: 'やや敏感', 6: '敏感', 7: 'かなり敏感'
};

// ---- 状態 ----
let audioCtx = null, analyser = null, micStream = null;
let loopTimer = null, calibTimer = null, recalibTimer = null, beepCtx = null;
let noiseFloor = 0, threshold = 0;
let speechStart = null, lastAlertTime = 0, alertCount = 0;
// calibStep: 'noise' | 'voice' | null
let calibStep = null;
let noiseSamples = [], voiceSamples = [];
// phase: 'idle' | 'calibrating' | 'watching' | 'detected'
let phase = 'idle';

// ---- DOM ----
const circle       = document.getElementById('status-circle');
const icon         = document.getElementById('status-icon');
const labelEl      = document.getElementById('status-label');
const message      = document.getElementById('message');
const levelBar     = document.getElementById('level-bar');
const threshInfo   = document.getElementById('threshold-info');
const startBtn     = document.getElementById('start-btn');
const stopBtn      = document.getElementById('stop-btn');
const recalibBtn   = document.getElementById('recalibrate-btn');
const resetBtn     = document.getElementById('reset-btn');
const alertCountEl   = document.getElementById('alert-count');
const savedInfoEl    = document.getElementById('saved-info');
const debugEl        = document.getElementById('debug-info');
const sensitivityEl  = document.getElementById('sensitivity');
const sensitivityVal = document.getElementById('sensitivity-val');

// ---- localStorage ----
function saveCalib() {
  const data = { noiseFloor, threshold, savedAt: new Date().toLocaleString('ja-JP') };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  savedInfoEl.textContent = `保存済み: ${data.savedAt}`;
}

function loadCalib() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// ---- ビープ音 ----
function beep(freq = 880, dur = 0.25, vol = 0.6) {
  if (!beepCtx) beepCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = beepCtx.createOscillator();
  const gain = beepCtx.createGain();
  osc.connect(gain);
  gain.connect(beepCtx.destination);
  osc.frequency.value = freq;
  osc.type = 'sine';
  gain.gain.setValueAtTime(vol, beepCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, beepCtx.currentTime + dur);
  osc.start(beepCtx.currentTime);
  osc.stop(beepCtx.currentTime + dur);
}

// ---- UI ----
function setPhaseUI(p, msg) {
  phase = p;
  circle.className = p;
  const icons  = { idle: '🎤', calibrating: '⏳', watching: '👁', detected: '⚠️' };
  const labels = { idle: '待機中', calibrating: 'キャリブ中', watching: '監視中', detected: '発話検出！' };
  icon.textContent  = icons[p]  || '🎤';
  labelEl.textContent = labels[p] || '';
  if (msg !== undefined) message.textContent = msg;
}

function effectiveThreshold() {
  return threshold * sensitivityToMultiplier(parseInt(sensitivityEl.value));
}

function updateThreshInfo() {
  threshInfo.textContent =
    `有効閾値: ${effectiveThreshold().toFixed(5)}（環境音: ${noiseFloor.toFixed(5)}）`;
}

// ---- キャリブレーション ----
function startCalibration() {
  noiseSamples = [];
  voiceSamples = [];
  calibStep = 'noise';
  setPhaseUI('calibrating', `静かにしてください…\n環境音を計測中（${NOISE_SEC}秒）`);

  let rem = NOISE_SEC;
  calibTimer = setInterval(() => {
    rem--;
    if (rem > 0) message.textContent = `静かにしてください…\n環境音を計測中（${rem}秒）`;
  }, 1000);

  setTimeout(() => {
    clearInterval(calibTimer);
    // 環境音ベースライン確定
    if (noiseSamples.length > 0) {
      const mean = noiseSamples.reduce((a, b) => a + b, 0) / noiseSamples.length;
      const max  = Math.max(...noiseSamples);
      noiseFloor = mean * 0.7 + max * 0.3;
    } else {
      noiseFloor = 0.005;
    }
    // 声フェーズへ
    calibStep = 'voice';
    setPhaseUI('calibrating', `今度は普通に話してください\n声を計測中（${VOICE_SEC}秒）`);
    let rem2 = VOICE_SEC;
    calibTimer = setInterval(() => {
      rem2--;
      if (rem2 > 0) message.textContent = `今度は普通に話してください\n声を計測中（${rem2}秒）`;
    }, 1000);
    setTimeout(() => {
      clearInterval(calibTimer);
      finishCalibration();
    }, VOICE_SEC * 1000);
  }, NOISE_SEC * 1000);
}

function finishCalibration() {
  calibStep = null;
  const voiceLevel = voiceSamples.length > 0
    ? voiceSamples.reduce((a, b) => a + b, 0) / voiceSamples.length
    : 0;

  if (voiceLevel > noiseFloor * 1.5) {
    // 環境音と声の間（環境音寄り35%）に閾値を設定
    threshold = noiseFloor + (voiceLevel - noiseFloor) * 0.35;
  } else {
    // 声が取れなかった場合は環境音の4倍
    threshold = Math.max(noiseFloor * 4.0, 0.005);
  }

  updateThreshInfo();
  saveCalib();
  setPhaseUI('watching', '監視中です\n独り言を検出したらアラートします');

  clearTimeout(recalibTimer);
  recalibTimer = setTimeout(() => {
    if (phase === 'watching') startCalibration();
  }, RECALIB_MS);
}

// ---- 解析ループ ----
function startLoop() {
  const dataArray = new Uint8Array(analyser.fftSize);
  let loopCount = 0;

  loopTimer = setInterval(() => {
    loopCount++;
    analyser.getByteTimeDomainData(dataArray);

    // RMSエネルギー計算
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const v = (dataArray[i] - 128) / 128;
      sum += v * v;
    }
    const energy = Math.sqrt(sum / dataArray.length);

    // バー更新
    const eff = effectiveThreshold();
    const ref = eff > 0 ? eff * 1.5 : 0.01;
    levelBar.style.width = Math.min(energy / ref * 100, 100) + '%';
    levelBar.className   = energy > eff ? 'over' : '';

    // デバッグ表示
    debugEl.textContent =
      `loop#${loopCount}  energy: ${energy.toFixed(6)}\n` +
      `threshold: ${eff.toFixed(6)}  noise: ${noiseFloor.toFixed(6)}`;

    // キャリブレーション中はサンプル蓄積
    if (phase === 'calibrating') {
      if (calibStep === 'noise') noiseSamples.push(energy);
      if (calibStep === 'voice') voiceSamples.push(energy);
      return;
    }
    if (phase !== 'watching' && phase !== 'detected') return;

    // 発話検出
    const now = Date.now();
    if (energy > eff) {
      if (!speechStart) speechStart = now;
      if (now - speechStart >= SPEECH_HOLD_MS && now - lastAlertTime > ALERT_COOLDOWN_MS) {
        lastAlertTime = now;
        speechStart   = null;
        alertCount++;
        alertCountEl.textContent = `アラート回数: ${alertCount}`;
        beep(880, 0.15);
        setTimeout(() => beep(880, 0.15), 180);
        setTimeout(() => beep(1100, 0.2), 360);
        setPhaseUI('detected', '⚠️ 独り言を検出しました');
        setTimeout(() => {
          if (phase === 'detected')
            setPhaseUI('watching', '監視中です\n独り言を検出したらアラートします');
        }, 3000);
      }
    } else {
      speechStart = null;
    }
  }, 100);
}

// ---- 感度スライダー ----
sensitivityEl.addEventListener('input', () => {
  const v = parseInt(sensitivityEl.value);
  sensitivityVal.textContent = SENSITIVITY_LABELS[v];
  localStorage.setItem(SENSITIVITY_KEY, v);
  if (threshold > 0) updateThreshInfo();
});

// ---- 起動時チェック ----
window.addEventListener('load', () => {
  const savedSens = localStorage.getItem(SENSITIVITY_KEY);
  if (savedSens) {
    sensitivityEl.value = savedSens;
  }
  sensitivityVal.textContent = SENSITIVITY_LABELS[parseInt(sensitivityEl.value)];

  const saved = loadCalib();
  if (saved) {
    savedInfoEl.textContent = `前回の設定: ${saved.savedAt}`;
    message.textContent = '前回の設定を読み込めます\n「開始」を押してください';
  }
});

// ---- 開始 ----
startBtn.addEventListener('click', async () => {
  try {
    beepCtx = new (window.AudioContext || window.webkitAudioContext)();
    await beepCtx.resume();

    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      video: false
    });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;

    const source = audioCtx.createMediaStreamSource(micStream);
    source.connect(analyser);
    const silentGain = audioCtx.createGain();
    silentGain.gain.value = 0;
    analyser.connect(silentGain);
    silentGain.connect(audioCtx.destination);

    startBtn.disabled   = true;
    stopBtn.disabled    = false;
    recalibBtn.disabled = false;

    startLoop();

    const saved = loadCalib();
    if (saved) {
      noiseFloor = saved.noiseFloor;
      threshold  = saved.threshold;
      updateThreshInfo();
      setPhaseUI('watching', '前回の設定で監視中です\n独り言を検出したらアラートします');
    } else {
      startCalibration();
    }
  } catch (e) {
    message.textContent = 'マイクへのアクセスが拒否されました。\nブラウザの設定を確認してください。';
    debugEl.textContent = 'エラー: ' + e.message;
  }
});

// ---- 停止 ----
stopBtn.addEventListener('click', () => {
  clearInterval(loopTimer);
  clearInterval(calibTimer);
  clearTimeout(recalibTimer);
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx)  audioCtx.close();
  audioCtx = analyser = micStream = null;
  speechStart = null;
  startBtn.disabled   = false;
  stopBtn.disabled    = true;
  recalibBtn.disabled = true;
  levelBar.style.width = '0%';
  threshInfo.textContent = '閾値: —';
  setPhaseUI('idle', '「開始」を押して\nキャリブレーションを始めてください');
});

// ---- 再キャリブレーション ----
recalibBtn.addEventListener('click', () => {
  if (phase === 'watching' || phase === 'detected') {
    speechStart = null;
    startCalibration();
  }
});

// ---- 設定リセット ----
resetBtn.addEventListener('click', () => {
  localStorage.removeItem(STORAGE_KEY);
  noiseFloor = 0;
  threshold  = 0;
  savedInfoEl.textContent = '';
  threshInfo.textContent  = '閾値: —';
  if (phase === 'idle') {
    message.textContent = '設定をリセットしました\n「開始」でキャリブレーションを行います';
  } else {
    message.textContent = '設定をリセットしました\n「再キャリブレーション」で再設定できます';
  }
});
</script>
</body>
</html>
