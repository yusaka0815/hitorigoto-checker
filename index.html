<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>独り言チェッカー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100dvh;
      padding: env(safe-area-inset-top, 12px) 20px env(safe-area-inset-bottom, 12px);
    }

    h1 { font-size: clamp(1.1rem, 4vw, 1.4rem); margin-top: 12px; margin-bottom: 2px; color: #a0c4ff; }
    .version { font-size: clamp(0.7rem, 2.5vw, 0.8rem); color: #888; margin-bottom: 10px; }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 0 0 rgba(33,150,243,0.35); }
      50%       { box-shadow: 0 0 0 14px rgba(33,150,243,0); }
    }
    @keyframes pulse-alert {
      0%   { box-shadow: 0 0 0 0 rgba(244,67,54,0.7); }
      70%  { box-shadow: 0 0 0 20px rgba(244,67,54,0); }
      100% { box-shadow: 0 0 0 0 rgba(244,67,54,0); }
    }
    @keyframes pulse-warn {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,152,0,0.4); }
      50%       { box-shadow: 0 0 0 10px rgba(255,152,0,0); }
    }

    #status-circle {
      width: clamp(110px, 32vw, 140px); height: clamp(110px, 32vw, 140px);
      border-radius: 50%; border: 4px solid #444;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin-bottom: 10px;
      transition: background 0.3s, border-color 0.3s;
      flex-shrink: 0;
    }
    #status-circle.idle        { background: #2d2d4e; border-color: #555; }
    #status-circle.calibrating { background: #2d4a2d; border-color: #4caf50; }
    #status-circle.watching    { background: #1e3a5f; border-color: #2196f3; animation: breathe 2.8s ease-in-out infinite; }
    #status-circle.detected    { background: #5f1e1e; border-color: #f44336; animation: pulse-alert 0.7s ease-out 3; }
    #status-circle.count1 { background: #1e3a2a; border-color: #8bc34a; animation: breathe 2.8s ease-in-out infinite; }
    #status-circle.count2 { background: #3a2a1e; border-color: #ff9800; animation: pulse-warn 1.4s ease-in-out infinite; }
    #status-circle.count3 { background: #5f1e1e; border-color: #f44336; animation: pulse-warn 0.8s ease-in-out infinite; }

    #status-icon  { font-size: clamp(2rem, 8vw, 2.6rem); }
    #status-label { font-size: clamp(0.75rem, 2.5vw, 0.85rem); margin-top: 4px; color: #aaa; }

    #message {
      font-size: clamp(0.85rem, 3vw, 1rem); text-align: center;
      min-height: 3.4em; margin-bottom: 8px;
      color: #ccc; line-height: 1.6;
      white-space: pre-wrap;
      flex-shrink: 0;
    }

    #level-bar-wrap { width: 100%; max-width: 340px; margin-bottom: 4px; flex-shrink: 0; }
    #level-label { font-size: clamp(0.72rem, 2.5vw, 0.8rem); color: #999; margin-bottom: 3px; }
    #level-bar-bg { background: #333; border-radius: 4px; height: 10px; overflow: hidden; }
    #level-bar {
      height: 100%; width: 0%;
      background: #2196f3; border-radius: 4px;
      transition: width 0.1s, background 0.1s;
    }
    #level-bar.over { background: #f44336; }

    #sensitivity-wrap {
      width: 100%; max-width: 340px; margin-bottom: 10px; flex-shrink: 0;
    }
    #sensitivity-wrap .sens-header {
      font-size: clamp(0.75rem, 2.5vw, 0.85rem); color: #bbb; margin-bottom: 6px;
    }
    #sensitivity { width: 100%; accent-color: #2196f3; height: 24px; }
    #sensitivity-wrap .ends {
      display: flex; justify-content: space-between;
      font-size: clamp(0.65rem, 2vw, 0.72rem); color: #666; margin-top: 3px;
    }
    #sensitivity-val { font-size: clamp(0.72rem, 2.5vw, 0.8rem); color: #2196f3; text-align: center; margin-top: 3px; }

    #btn-row1 { display: flex; justify-content: center; margin-bottom: 6px; flex-shrink: 0; }
    #btn-row2 { display: flex; justify-content: center; gap: 8px; flex-shrink: 0; }

    button {
      padding: clamp(11px, 3vw, 14px) clamp(24px, 7vw, 32px);
      font-size: clamp(0.9rem, 3.5vw, 1.05rem);
      border: none; border-radius: 10px;
      cursor: pointer; background: #2196f3; color: #fff; margin: 4px;
      min-height: 48px;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active:not(:disabled) { transform: scale(0.95); opacity: 0.85; }
    button:disabled { background: #444; color: #666; cursor: default; }
    #stop-btn        { background: #e53935; }
    #recalibrate-btn { background: #555; font-size: clamp(0.8rem, 2.8vw, 0.9rem); padding: clamp(10px, 2.5vw, 12px) clamp(16px, 4vw, 22px); }
    #reset-btn       { background: #5a7a3a; font-size: clamp(0.8rem, 2.8vw, 0.9rem); padding: clamp(10px, 2.5vw, 12px) clamp(16px, 4vw, 22px); }

    #count-dots { display: flex; justify-content: center; gap: 12px; margin: 8px 0; flex-shrink: 0; }
    #count-dots:empty { margin: 0; }
    .count-dot {
      width: clamp(18px, 5vw, 22px); height: clamp(18px, 5vw, 22px); border-radius: 50%;
      background: #333; border: 2px solid #444;
      transition: background 0.3s, border-color 0.3s;
    }
    .count-dot.active-1 { background: #5a8a2a; border-color: #8bc34a; }
    .count-dot.active-2 { background: #8a5a1a; border-color: #ff9800; }
    .count-dot.active-3 { background: #8a1a1a; border-color: #f44336; }

    #voice-prompt {
      display: none;
      background: #1e2a1e; border: 1px solid #3a5a3a; border-radius: 10px;
      padding: 10px 16px; margin-bottom: 8px;
      width: 100%; max-width: 340px; flex-shrink: 0;
    }
    #voice-prompt .prompt-label { font-size: clamp(0.68rem, 2.2vw, 0.75rem); color: #6a8; margin-bottom: 6px; }
    #voice-prompt .prompt-text  { font-size: clamp(0.9rem, 3vw, 1rem); color: #cec; line-height: 1.7; }
    #voice-progress-wrap {
      display: none; width: 100%; max-width: 340px;
      margin-bottom: 6px; flex-shrink: 0;
    }
    #voice-progress-label { font-size: clamp(0.7rem, 2.2vw, 0.78rem); color: #6a8; margin-bottom: 3px; }
    #voice-progress-bg { background: #333; border-radius: 4px; height: 8px; overflow: hidden; }
    #voice-progress-bar { height: 100%; width: 0%; background: #4caf50; border-radius: 4px; transition: width 0.2s; }

    #alert-count {
      display: inline-flex; align-items: center; gap: 6px;
      background: #252540; border: 1px solid #3a3a5a; border-radius: 20px;
      padding: 4px 14px;
      font-size: clamp(0.78rem, 2.6vw, 0.88rem); color: #aaa; flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }
    #alert-count.alerted {
      background: #3a1e1e; border-color: #f44336; color: #f88;
    }
    #monitor-time { font-size: clamp(0.62rem, 2vw, 0.7rem); color: #445; flex-shrink: 0; margin-top: 2px; }
    #calib-result { font-size: clamp(0.72rem, 2.5vw, 0.8rem); color: #888; margin-top: 5px; line-height: 1.8; text-align: center; white-space: pre-wrap; flex-shrink: 0; }
    #saved-info   { font-size: clamp(0.68rem, 2.2vw, 0.75rem); color: #4a8; margin-top: 4px; flex-shrink: 0; }
    #wake-lock-status { font-size: clamp(0.62rem, 2vw, 0.68rem); color: #3a3a5a; margin-top: 4px; flex-shrink: 0; }

    #install-banner {
      display: none;
      align-items: center; justify-content: space-between;
      width: 100%; max-width: 340px;
      background: #1e3a5f; border: 1px solid #2196f3;
      border-radius: 10px; padding: 10px 14px;
      margin-top: 10px; flex-shrink: 0; gap: 10px;
    }
    #install-banner span { font-size: clamp(0.8rem, 2.8vw, 0.9rem); color: #cce; }
    #install-btn {
      padding: 8px 16px; font-size: clamp(0.78rem, 2.5vw, 0.85rem);
      background: #2196f3; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      white-space: nowrap; min-height: unset; margin: 0;
    }
  </style>
</head>
<body>
  <h1>独り言チェッカー</h1>
  <div class="version">v1.6.72</div>

  <div id="status-circle" class="idle">
    <div id="status-icon">🎤</div>
    <div id="status-label">待機中</div>
  </div>

  <div id="message">「開始」を押して<br>キャリブレーションを始めてください</div>

  <div id="level-bar-wrap">
    <div id="level-label">音量レベル</div>
    <div id="level-bar-bg"><div id="level-bar"></div></div>
  </div>

  <div id="sensitivity-wrap">
    <div class="sens-header">感度調整</div>
    <input type="range" id="sensitivity" min="1" max="7" step="1" value="4">
    <div class="ends"><span>鈍感（誤検知を減らす）</span><span>敏感（小声も検出）</span></div>
    <div id="sensitivity-val">標準</div>
  </div>

  <div id="btn-row1">
    <button id="start-btn">開始</button>
    <button id="stop-btn" disabled>停止</button>
  </div>
  <div id="btn-row2">
    <button id="recalibrate-btn" disabled>再キャリブレーション</button>
    <button id="reset-btn">設定リセット</button>
  </div>

  <div id="voice-prompt">
    <div class="prompt-label">以下の文を声に出して読んでください</div>
    <div class="prompt-text">「今日もよろしくお願いします。<br>ちょっと待って。なるほどね。」</div>
  </div>
  <div id="voice-progress-wrap">
    <div id="voice-progress-label">サンプル収集中... 0/60</div>
    <div id="voice-progress-bg"><div id="voice-progress-bar"></div></div>
  </div>

  <div id="count-dots"></div>
  <div id="alert-count">🔔 アラート: <span id="alert-count-num">0</span></div>
  <div id="monitor-time"></div>
  <div id="calib-result"></div>
  <div id="saved-info"></div>
  <div id="wake-lock-status"></div>
  <div id="install-banner">
    <span>📲 ホーム画面に追加できます</span>
    <button id="install-btn">追加する</button>
  </div>

<script>
// ---- 定数 ----
const NOISE_SEC            = 4;
const VOICE_MIN_SAMPLES    = 60;  // 完了に必要な有効ピッチサンプル数
const VOICE_MIN_SEC        = 5;   // 最短キャリブレーション時間（秒）
const VOICE_MAX_SEC        = 20;  // タイムアウト（秒）
const ALERT_COOLDOWN_MS = 5000;
const STORAGE_KEY       = 'hitorigoto_calib';
const SENSITIVITY_KEY   = 'hitorigoto_sensitivity';
// ピッチ検出の対象範囲（人の声の基本周波数）
const PITCH_MIN_HZ      = 75;
const PITCH_MAX_HZ      = 350;
// キャリブレーションしたピッチへの許容マージン（Hz）
const PITCH_MARGIN_HZ   = 80;

// 断続発声検出
const SPEECH_WINDOW_MS  = 5000; // 判定ウィンドウ（5秒）
const SPEECH_MIN_SEG_MS = 350;  // 1回の発声の最小継続時間（ms）※せき・短音を除外
const SPEECH_COUNT_ALERT = 3;   // この回数以上でアラート

// 感度スライダー値 → 閾値乗数（1=鈍感×2.0、4=標準×1.2、7=敏感×0.4）
function sensitivityMultiplier(v) {
  return 2.0 - (v - 1) * (1.6 / 6);
}
const SENSITIVITY_LABELS = {
  1:'かなり鈍感', 2:'鈍感', 3:'やや鈍感',
  4:'標準', 5:'やや敏感', 6:'敏感', 7:'かなり敏感'
};

// ---- 状態 ----
let audioCtx = null, analyser = null, micStream = null;
let loopTimer = null, calibTimer = null, noisePhaseTimer = null, beepCtx = null;
let noiseFloor = 0, threshold = 0;
let voicePitchMean = 0;   // キャリブ済みピッチ（Hz）
let segmentStart = null;       // 現在の発声セグメント開始時刻
let speechSegments = [];       // 過去セグメント [{end, duration}]
let lastAlertTime = 0, alertCount = 0;
let monitoringStart = 0, monitorTimer = null;
let calibStep = null;     // 'noise' | 'voice' | null
let noiseSamples = [], voicePitchSamples = [], voiceEnergySamples = [];
let savedSampleCount = 0; // localStorageから復元したサンプル数（quality表示用）
let dotEls = [];          // カウントドット要素キャッシュ
let phase = 'idle';

// ---- DOM ----
const circle         = document.getElementById('status-circle');
const icon           = document.getElementById('status-icon');
const labelEl        = document.getElementById('status-label');
const message        = document.getElementById('message');
const levelBar       = document.getElementById('level-bar');
const startBtn       = document.getElementById('start-btn');
const stopBtn        = document.getElementById('stop-btn');
const recalibBtn     = document.getElementById('recalibrate-btn');
const resetBtn       = document.getElementById('reset-btn');
const alertCountEl    = document.getElementById('alert-count');
const alertCountNum   = document.getElementById('alert-count-num');
const monitorTimeEl   = document.getElementById('monitor-time');
const savedInfoEl    = document.getElementById('saved-info');
const sensitivityEl   = document.getElementById('sensitivity');
const sensitivityVal  = document.getElementById('sensitivity-val');
const countDotsEl     = document.getElementById('count-dots');
const calibResultEl      = document.getElementById('calib-result');
const wakeLockStatusEl   = document.getElementById('wake-lock-status');
const voicePromptEl      = document.getElementById('voice-prompt');
const voiceProgressWrap  = document.getElementById('voice-progress-wrap');
const voiceProgressLabel = document.getElementById('voice-progress-label');
const voiceProgressBar   = document.getElementById('voice-progress-bar');

// ---- localStorage ----
function saveCalib() {
  const data = {
    noiseFloor, threshold, voicePitchMean,
    sampleCount: voicePitchSamples.length,
    savedAt: new Date().toLocaleString('ja-JP')
  };
  savedSampleCount = data.sampleCount; // v1.6.66: メモリ上の値をlocalStorageと同期
  try { // v1.6.53: プライベートモード等でlocalStorageが使えない場合に備える
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    savedInfoEl.textContent = `保存済み: ${data.savedAt}`;
  } catch { /* 保存失敗は無視（次回起動時にキャリブが必要になるだけ） */ }
}

function loadCalib() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// ---- ビープ音（フォールバック用） ----
function beep(freq = 880, dur = 0.25, vol = 0.6) {
  if (!beepCtx) beepCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = beepCtx.createOscillator();
  const gain = beepCtx.createGain();
  osc.connect(gain);
  gain.connect(beepCtx.destination);
  osc.frequency.value = freq;
  osc.type = 'sine';
  gain.gain.setValueAtTime(vol, beepCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, beepCtx.currentTime + dur);
  osc.start(beepCtx.currentTime);
  osc.stop(beepCtx.currentTime + dur);
}

// ---- 音声アラート ----
const ALERT_MESSAGES = [
  '独り言に注意してください',
  '声に出ていますよ',
  '独り言が検出されました',
];
let alertMsgIndex = 0;

function speakAlert() {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    window.speechSynthesis.resume(); // Android Chromeで無音になるバグの回避策
    const msg = ALERT_MESSAGES[alertMsgIndex % ALERT_MESSAGES.length];
    alertMsgIndex++;
    const utter = new SpeechSynthesisUtterance(msg);
    utter.lang   = 'ja-JP';
    utter.rate   = 1.0;
    utter.pitch  = 1.1;
    utter.volume = 1.0;
    utter.onerror = (evt) => {
      // cancel/interrupted（stopAudio()による意図的なキャンセル）は無視
      if (evt.error === 'interrupted' || evt.error === 'cancelled') return;
      // v1.6.72: キャリブ中も含めて監視フェーズ以外では鳴らさない（'idle'だけでなく'calibrating'も除外）
      if (phase !== 'watching' && phase !== 'detected') return;
      // 音声合成に失敗した場合はビープ音にフォールバック
      beep(880, 0.15);
      setTimeout(() => { if (phase === 'watching' || phase === 'detected') beep(880, 0.15); }, 180);
      setTimeout(() => { if (phase === 'watching' || phase === 'detected') beep(1100, 0.2); }, 360);
    };
    window.speechSynthesis.speak(utter);
  } else {
    // 非対応ブラウザはビープ音にフォールバック
    beep(880, 0.15);
    setTimeout(() => { if (phase === 'watching' || phase === 'detected') beep(880, 0.15); }, 180);
    setTimeout(() => { if (phase === 'watching' || phase === 'detected') beep(1100, 0.2); }, 360);
  }
}

// ---- UI ----
function setPhaseUI(p, msg) {
  phase = p;
  circle.className = p;
  const icons  = { idle:'🎤', calibrating:'⏳', watching:'👁', detected:'⚠️' };
  const labels = { idle:'待機中', calibrating:'キャリブ中', watching:'監視中', detected:'発話検出！' };
  icon.textContent    = icons[p]  || '🎤';
  labelEl.textContent = labels[p] || '';
  if (msg !== undefined) message.textContent = msg;
}

function effectiveThreshold() {
  return threshold * sensitivityMultiplier(parseInt(sensitivityEl.value));
}

// ---- 画面常時点灯（Wake Lock + 無音動画の二重対策） ----
let wakeLock = null;
let noSleepVideo = null;

// 1x1px の透明WebMを無音ループ再生してOSに「メディア再生中」と認識させる
// MDMポリシーでWake Lock APIが制限されている場合のフォールバック
function startNoSleepVideo() {
  if (noSleepVideo) {
    // 画面復帰時にOSが再生を止めていた場合に再開
    noSleepVideo.play().catch(() => {});
    return;
  }
  // 最小構成のWebMバイナリ（1フレーム・無音・約225バイト）
  const webm = 'data:video/webm;base64,GkXfowEAAAAAAAAfQoaBAUL3gQFC8oEEQvOBCEKChHdlYm1CEwen' +
    'HFNUW0ZGhVZ0ebaxaz9ns01oPKPsaujlf37TtSaHLSXOSevUYZLepNgMeMSXS5AAAAAAAAAAAAA' +
    'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABVSalmQCgq17FAAMSpgQBM' +
    'vISpgQBMvISpgQBMvISpgQBMvISpgQBMvISpgQBMvISpgQBMvISpgQBMvISpgQBMvIWA';
  noSleepVideo = document.createElement('video');
  noSleepVideo.setAttribute('playsinline', '');
  noSleepVideo.setAttribute('muted', '');
  noSleepVideo.loop  = true;
  noSleepVideo.src   = webm;
  noSleepVideo.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;';
  document.body.appendChild(noSleepVideo);
  noSleepVideo.play().catch(() => {});
}

function stopNoSleepVideo() {
  if (!noSleepVideo) return;
  noSleepVideo.pause();
  noSleepVideo.remove();
  noSleepVideo = null;
}

async function requestWakeLock() {
  // まず無音動画を開始（MDM環境でも有効）
  startNoSleepVideo();

  // Wake Lock APIも併用（対応環境ではより確実）
  // v1.6.70: 既にアクティブなロックがある場合は再取得しない
  // （再取得すると古いsentinelのreleaseリスナーがwakeLock変数をnullにして新sentinelを漏らす恐れがある）
  if ('wakeLock' in navigator && !wakeLock) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLockStatusEl.textContent = '画面常時点灯：有効';
      wakeLock.addEventListener('release', () => {
        wakeLock = null; // ブラウザが自動解放した場合もnullにしておく
        wakeLockStatusEl.textContent = '画面常時点灯：有効（動画）';
      });
    } catch (e) {
      wakeLockStatusEl.textContent = '画面常時点灯：有効（動画）';
    }
  } else {
    wakeLockStatusEl.textContent = '画面常時点灯：有効（動画）';
  }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
  stopNoSleepVideo();
  wakeLockStatusEl.textContent = '';
}

// 画面が非表示→再表示されたとき再取得
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && phase !== 'idle') {
    await requestWakeLock();
    // v1.6.59: await中に停止操作が入った場合、noSleepVideoが残るのを防ぐ
    if (phase === 'idle') { releaseWakeLock(); return; }
    // モバイルでは画面復帰時にAudioContextがsuspendedになる場合がある
    audioCtx?.resume().catch(() => {}); // v1.6.54: 未処理Promise拒否を防止
    beepCtx?.resume().catch(() => {});
    // v1.6.52: Android Chromeはspeechsynthesisも画面消灯でpausedになることがある
    if ('speechSynthesis' in window) window.speechSynthesis.resume();
  }
});

// ---- カウントドット ----
function initDots() {
  countDotsEl.innerHTML = '';
  dotEls = [];
  for (let i = 0; i < SPEECH_COUNT_ALERT; i++) {
    const dot = document.createElement('div');
    dot.className = 'count-dot';
    dotEls.push(dot);
    countDotsEl.appendChild(dot);
  }
}

function updateCountUI(count) {
  if (phase !== 'watching' && phase !== 'detected') return;
  // サークルの色（detected中は上書きしない — pulse-alertアニメーションを保護）
  if (phase === 'watching') {
    circle.className = count === 0 ? 'watching'
      : count === 1 ? 'count1'
      : count === 2 ? 'count2'
      : 'count3';
  }

  // ドットの色（キャッシュ済み要素を直接参照）
  const dotClass = count === 1 ? 'active-1' : count === 2 ? 'active-2' : 'active-3';
  for (let i = 0; i < dotEls.length; i++) {
    dotEls[i].className = 'count-dot' + (i < count ? ` ${dotClass}` : '');
  }
}

function updateCalibResult() {
  const noiseLabel  = noiseFloor < 0.01 ? '静か' : noiseFloor < 0.03 ? 'やや静か' : 'やや騒がしい';
  const pitchLabel  = voicePitchMean > 0 ? `${Math.round(voicePitchMean)}Hz付近` : '未取得';
  // 直近のキャリブ or 保存データのどちらかのサンプル数を使う
  const count = voicePitchSamples.length || savedSampleCount;
  const qualityLabel = count >= 50 ? 'しっかり取れました'
                     : count >= 25 ? 'まずまず取れました'
                     : '取得が不十分かもしれません（再キャリブレーション推奨）';
  calibResultEl.textContent =
    `環境音：${noiseLabel}　声：${qualityLabel}\nピッチ：${pitchLabel}`;
}

// ---- ピッチ検出（FFT周波数データから） ----
function detectPitch(freqData, sampleRate, fftSize) {
  const binSize = sampleRate / fftSize;
  const minBin  = Math.max(1, Math.floor(PITCH_MIN_HZ / binSize));
  const maxBin  = Math.min(Math.floor(PITCH_MAX_HZ / binSize), freqData.length - 1);

  // 基本周波数帯のピーク探索
  let maxVal = 0, maxIdx = -1;
  for (let i = minBin; i <= maxBin; i++) {
    if (freqData[i] > maxVal) {
      maxVal = freqData[i];
      maxIdx = i;
    }
  }
  if (maxIdx < 0 || maxVal < 40) return null; // 信号が弱すぎる

  const pitchHz = maxIdx * binSize;

  // 倍音チェック（2倍・3倍の周波数にもエネルギーがあるか）
  const h2 = maxIdx * 2;
  const h3 = maxIdx * 3;
  const h2val = h2 < freqData.length ? freqData[h2] : 0;
  const h3val = h3 < freqData.length ? freqData[h3] : 0;
  const harmonicStrength = (h2val + h3val) / (maxVal * 2);

  return { pitchHz, harmonicStrength };
}

// ---- キャリブレーション ----
let voiceCalibStart = 0; // 声フェーズ開始時刻

function startCalibration() {
  recalibBtn.disabled = true; // キャリブ完了まで再キャリブ不可
  noiseSamples       = [];
  voicePitchSamples  = [];
  voiceEnergySamples = [];
  voicePromptEl.style.display     = 'none';
  voiceProgressWrap.style.display = 'none';
  // 再キャリブ時に前の watching 状態のドットが残らないようリセット
  for (let i = 0; i < dotEls.length; i++) dotEls[i].className = 'count-dot';
  // v1.6.45: アラートバッジも新セッション開始時にリセット（キャリブ中も赤いまま残らないように）
  alertCount = 0;
  alertCountNum.textContent = '0';
  alertCountEl.classList.remove('alerted');
  calibStep = 'noise';
  setPhaseUI('calibrating', `静かにしてください…\n環境音を計測中（${NOISE_SEC}秒）`);

  let rem = NOISE_SEC;
  calibTimer = setInterval(() => {
    rem--;
    if (rem > 0) message.textContent = `静かにしてください…\n環境音を計測中（${rem}秒）`;
  }, 1000);

  noisePhaseTimer = setTimeout(() => {
    noisePhaseTimer = null;
    clearInterval(calibTimer);
    // 環境音ベースライン確定
    if (noiseSamples.length > 0) {
      const mean = noiseSamples.reduce((a, b) => a + b, 0) / noiseSamples.length;
      const max  = Math.max(...noiseSamples);
      noiseFloor = mean * 0.7 + max * 0.3;
    } else {
      noiseFloor = 0.005;
    }
    // 声フェーズへ
    calibStep = 'voice';
    voiceCalibStart = Date.now();
    setPhaseUI('calibrating', '下の文を声に出して読んでください');
    voicePromptEl.style.display     = 'block';
    voiceProgressWrap.style.display = 'block';
    voiceProgressLabel.textContent  = `サンプル収集中... 0/${VOICE_MIN_SAMPLES}`;
    voiceProgressBar.style.width    = '0%';

    // タイムアウト保険
    calibTimer = setTimeout(() => {
      if (calibStep === 'voice') finishCalibration();
    }, VOICE_MAX_SEC * 1000);
  }, NOISE_SEC * 1000);
}

function finishCalibration() {
  calibStep = null;
  clearTimeout(calibTimer); calibTimer = null; // v1.6.67: stopAudioと同様にnullで統一
  voicePromptEl.style.display     = 'none';
  voiceProgressWrap.style.display = 'none';

  // 音量閾値
  const voiceEnergy = voiceEnergySamples.length > 0
    ? voiceEnergySamples.reduce((a, b) => a + b, 0) / voiceEnergySamples.length : 0;
  if (voiceEnergy > noiseFloor * 1.5) {
    threshold = noiseFloor + (voiceEnergy - noiseFloor) * 0.35;
  } else {
    threshold = Math.max(noiseFloor * 4.0, 0.005);
  }

  // ピッチ（外れ値を除いた中央付近の平均）
  if (voicePitchSamples.length > 5) {
    const sorted = [...voicePitchSamples].sort((a, b) => a - b);
    const trim   = Math.floor(sorted.length * 0.2);
    const core   = sorted.slice(trim, sorted.length - trim);
    voicePitchMean = core.reduce((a, b) => a + b, 0) / core.length;
  } else {
    voicePitchMean = 0; // ピッチが取れなかった場合は音量のみで判定
  }

  updateCalibResult();
  saveCalib();

  // 完了メッセージを表示してから監視へ移行
  const sampleCount = voicePitchSamples.length;
  const completeMsg = sampleCount >= 50
    ? 'キャリブレーション完了！\nまもなく監視を開始します'
    : 'キャリブレーション完了\n（声のサンプルが少なめです）';
  setPhaseUI('calibrating', completeMsg);

  setTimeout(() => {
    if (phase !== 'calibrating' || calibStep !== null) return; // Stop済み or 新キャリブ開始済みなら遷移しない
    recalibBtn.disabled = false;
    initDots();
    lastAlertTime = 0;
    alertCount = 0;
    alertMsgIndex = 0; // v1.6.69: 新セッション開始時にアラートメッセージを最初から再開
    alertCountNum.textContent = '0';
    alertCountEl.classList.remove('alerted');
    startMonitorTimer();
    setPhaseUI('watching', '監視中です\n独り言を検出したらアラートします');
  }, 2000);
}

// ---- 解析ループ ----
function startLoop() {
  const timeData = new Uint8Array(analyser.fftSize);
  const freqData = new Uint8Array(analyser.frequencyBinCount);

  loopTimer = setInterval(() => {
    analyser.getByteTimeDomainData(timeData);
    analyser.getByteFrequencyData(freqData);

    // 時間領域RMSエネルギー
    let sum = 0;
    for (let i = 0; i < timeData.length; i++) {
      const v = (timeData[i] - 128) / 128;
      sum += v * v;
    }
    const energy = Math.sqrt(sum / timeData.length);

    // ピッチ検出
    const pitchResult = detectPitch(freqData, audioCtx.sampleRate, analyser.fftSize);

    // バー更新（有効閾値基準）
    const eff = effectiveThreshold();
    const ref  = eff > 0 ? eff * 1.5 : 0.01;
    levelBar.style.width = Math.min(energy / ref * 100, 100) + '%';

    // 声判定：音量 AND ピッチ（ピッチキャリブ済みの場合）
    const energyOk = energy > eff;
    let voiceOk = energyOk;
    if (energyOk && voicePitchMean > 0) {
      if (!pitchResult) {
        // 声の周波数帯にピッチが検出できなかった → 声ではない
        voiceOk = false;
      } else {
        const pitchDiff = Math.abs(pitchResult.pitchHz - voicePitchMean);
        voiceOk = pitchDiff <= PITCH_MARGIN_HZ && pitchResult.harmonicStrength > 0.25;
      }
    }
    levelBar.className = voiceOk ? 'over' : '';

    // キャリブレーション中はサンプル蓄積
    if (phase === 'calibrating') {
      if (calibStep === 'noise') {
        noiseSamples.push(energy);
      } else if (calibStep === 'voice') {
        voiceEnergySamples.push(energy);
        if (pitchResult && pitchResult.harmonicStrength > 0.1) {
          voicePitchSamples.push(pitchResult.pitchHz);
        }
        // 進捗表示
        const count = voicePitchSamples.length;
        const pct   = Math.min(count / VOICE_MIN_SAMPLES * 100, 100);
        voiceProgressBar.style.width   = pct + '%';
        voiceProgressLabel.textContent = `サンプル収集中... ${count}/${VOICE_MIN_SAMPLES}`;

        // 十分なサンプルが集まり、かつ最短時間を過ぎたら自動完了
        const elapsed = Date.now() - voiceCalibStart;
        if (count >= VOICE_MIN_SAMPLES && elapsed >= VOICE_MIN_SEC * 1000) {
          finishCalibration();
        }
      }
      return;
    }
    if (phase !== 'watching' && phase !== 'detected') return;

    // 発話検出（断続発声対応）
    const now = Date.now();
    if (voiceOk) {
      if (!segmentStart) segmentStart = now;
    } else {
      if (segmentStart) {
        const dur = now - segmentStart;
        if (dur >= SPEECH_MIN_SEG_MS) {
          speechSegments.push({ end: now, duration: dur });
        }
        segmentStart = null;
      }
    }

    // 先頭から古いセグメントを削除（セグメントはend時刻の昇順で蓄積される）
    while (speechSegments.length > 0 && now - speechSegments[0].end >= SPEECH_WINDOW_MS) {
      speechSegments.shift();
    }

    // ウィンドウ内の発声回数
    const count = speechSegments.length;
    updateCountUI(count);

    if (count >= SPEECH_COUNT_ALERT && now - lastAlertTime > ALERT_COOLDOWN_MS) {
      lastAlertTime  = now;
      segmentStart   = null;
      speechSegments = [];
      alertCount++;
      alertCountNum.textContent = String(alertCount);
      alertCountEl.classList.add('alerted');
      speakAlert();
      setPhaseUI('detected', '⚠️ 独り言を検出しました');
      setTimeout(() => {
        if (phase === 'detected')
          setPhaseUI('watching', '監視中です\n独り言を検出したらアラートします');
      }, 3000);
    }
  }, 100);
}

// ---- 監視経過時間 ----
function startMonitorTimer() {
  monitoringStart = Date.now();
  clearInterval(monitorTimer);
  monitorTimeEl.textContent = '監視 0分00秒'; // v1.6.60: 即時表示
  monitorTimer = setInterval(() => {
    const sec = Math.floor((Date.now() - monitoringStart) / 1000);
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    // v1.6.65: 1時間以上の場合は時間表示を追加
    monitorTimeEl.textContent = h > 0
      ? `監視 ${h}時間${m}分${String(s).padStart(2,'0')}秒`
      : `監視 ${m}分${String(s).padStart(2,'0')}秒`;
  }, 1000);
}

function stopMonitorTimer() {
  clearInterval(monitorTimer);
  monitorTimer = null;
  monitorTimeEl.textContent = '';
}

// ---- 停止共通処理 ----
function stopAudio() {
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  voicePromptEl.style.display     = 'none';
  voiceProgressWrap.style.display = 'none';
  stopMonitorTimer();
  clearInterval(loopTimer);  loopTimer = null;  // v1.6.64: 他のタイマー変数と統一
  clearInterval(calibTimer);
  clearTimeout(calibTimer);   calibTimer = null;
  clearTimeout(noisePhaseTimer);
  noisePhaseTimer = null;
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx)  audioCtx.close().catch(() => {}); // v1.6.56: 既にclosed状態でも安全
  if (beepCtx)   { beepCtx.close().catch(() => {}); beepCtx = null; }
  audioCtx = analyser = micStream = null;
  segmentStart = null;
  speechSegments = [];
  // 待機中画面でドットが残らないようにDOMから削除
  countDotsEl.innerHTML = '';
  dotEls = [];
  releaseWakeLock();
  startBtn.disabled   = false;
  stopBtn.disabled    = true;
  recalibBtn.disabled = true;
  levelBar.style.width = '0%';
  levelBar.className = ''; // v1.6.62: 停止時に音量バーの色状態もリセット
}

// ---- 感度スライダー ----
sensitivityEl.addEventListener('input', () => {
  const v = parseInt(sensitivityEl.value);
  sensitivityVal.textContent = SENSITIVITY_LABELS[v];
  try { localStorage.setItem(SENSITIVITY_KEY, v); } catch {} // v1.6.58: プライベートモード等に対応
  if (threshold > 0) updateCalibResult();
});

// ---- 起動時チェック ----
window.addEventListener('load', () => {
  // v1.6.71: getItemもプライベートモード等で例外を投げる場合があるのでtry/catch（loadCalibと統一）
  try {
    const savedSens = localStorage.getItem(SENSITIVITY_KEY);
    if (savedSens) sensitivityEl.value = savedSens;
  } catch {}
  sensitivityVal.textContent = SENSITIVITY_LABELS[parseInt(sensitivityEl.value)];

  const saved = loadCalib();
  if (saved && saved.threshold > 0 && saved.noiseFloor >= 0) { // v1.6.44: match startBtn validation
    savedInfoEl.textContent = `前回の設定: ${saved.savedAt}`;
    message.textContent = '前回の設定を読み込めます\n「開始」を押してください';
  }
});

// ---- 開始 ----
startBtn.addEventListener('click', async () => {
  startBtn.disabled = true; // 二重クリック防止：getUserMediaダイアログ中も無効化
  try {
    beepCtx = new (window.AudioContext || window.webkitAudioContext)();
    await beepCtx.resume();

    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      video: false
    });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;

    const source = audioCtx.createMediaStreamSource(micStream);
    source.connect(analyser);
    const silentGain = audioCtx.createGain();
    silentGain.gain.value = 0;
    analyser.connect(silentGain);
    silentGain.connect(audioCtx.destination);

    stopBtn.disabled    = false;
    recalibBtn.disabled = false;

    await requestWakeLock();
    // v1.6.47: stopAudio()が非同期待機中に呼ばれた場合（audioCtx=null）はクリーンに中断
    if (!audioCtx) { releaseWakeLock(); return; }
    startLoop();

    const saved = loadCalib();
    if (saved && saved.threshold > 0 && saved.noiseFloor >= 0) {
      noiseFloor        = saved.noiseFloor;
      threshold         = saved.threshold;
      voicePitchMean    = saved.voicePitchMean || 0;
      savedSampleCount  = saved.sampleCount    || 0;
      updateCalibResult();
      initDots();
      lastAlertTime = 0;
      alertCount = 0;
      alertMsgIndex = 0; // v1.6.69: 新セッション開始時にアラートメッセージを最初から再開
      alertCountNum.textContent = '0';
      alertCountEl.classList.remove('alerted');
      startMonitorTimer();
      setPhaseUI('watching', '前回の設定で監視中です\n独り言を検出したらアラートします');
    } else {
      startCalibration();
    }
  } catch (e) {
    // 途中で失敗したリソースを解放
    releaseWakeLock(); // v1.6.68: requestWakeLock済みの場合に備えて解放（冪等なので安全）
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx)  { audioCtx.close().catch(() => {}); audioCtx = analyser = null; }
    if (beepCtx)   { beepCtx.close().catch(() => {}); beepCtx = null; }
    const errMsg = e?.name === 'NotAllowedError'
      ? 'マイクへのアクセスが拒否されました。\nブラウザの設定を確認してください。'
      : e?.name === 'NotFoundError'
      ? 'マイクが見つかりません。\nデバイスを確認してください。'
      : 'マイクを起動できませんでした。\n他のアプリがマイクを使用中かもしれません。';
    startBtn.disabled   = false; // エラー時は再試行できるよう再有効化
    stopBtn.disabled    = true;
    recalibBtn.disabled = true;
    message.textContent = errMsg;
  }
});

// ---- 停止 ----
stopBtn.addEventListener('click', () => {
  stopAudio();
  // v1.6.46: 保存済みデータがあれば「キャリブ不要」と伝える（loadと同じ判定）
  const saved = loadCalib();
  const idleMsg = (saved && saved.threshold > 0 && saved.noiseFloor >= 0)
    ? '前回の設定を読み込めます\n「開始」を押してください'
    : '「開始」を押して\nキャリブレーションを始めてください';
  setPhaseUI('idle', idleMsg);
});

// ---- 再キャリブレーション ----
recalibBtn.addEventListener('click', () => {
  if (phase === 'watching' || phase === 'detected') {
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    stopMonitorTimer();
    segmentStart = null;
    speechSegments = [];
    startCalibration();
  }
});

// ---- 設定リセット ----
resetBtn.addEventListener('click', () => {
  if (phase !== 'idle') stopAudio();
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(SENSITIVITY_KEY);
  noiseFloor = 0; threshold = 0; voicePitchMean = 0; savedSampleCount = 0;
  sensitivityEl.value = 4;
  sensitivityVal.textContent = SENSITIVITY_LABELS[4];
  savedInfoEl.textContent  = '';
  calibResultEl.textContent = '';
  alertCount = 0;
  alertMsgIndex = 0; // v1.6.61: リセット後のアラートメッセージを最初から再開
  alertCountNum.textContent = '0';
  alertCountEl.classList.remove('alerted');
  countDotsEl.innerHTML = '';
  dotEls = [];
  setPhaseUI('idle', '設定をリセットしました\n「開始」でキャリブレーションを行います');
});

// ---- PWAインストールプロンプト ----
let installPromptEvent = null;
const installBanner = document.getElementById('install-banner');
const installBtn    = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  installPromptEvent = e;
  installBanner.style.display = 'flex';
});

installBtn.addEventListener('click', async () => {
  if (!installPromptEvent) return;
  installPromptEvent.prompt();
  const { outcome } = await installPromptEvent.userChoice;
  installPromptEvent = null;
  installBanner.style.display = 'none'; // 承認/拒否どちらでもバナーを非表示
  if (outcome === 'accepted') return;
  // 拒否された場合は何もしない（beforeinstallpromptが再発火するまで非表示のまま）
});

window.addEventListener('appinstalled', () => {
  installBanner.style.display = 'none';
  installPromptEvent = null;
});

// ---- サービスワーカー登録 ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
