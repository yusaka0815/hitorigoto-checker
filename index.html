<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>独り言チェッカー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100dvh;
      padding: env(safe-area-inset-top, 12px) 20px env(safe-area-inset-bottom, 12px);
    }

    h1 { font-size: 1.2rem; margin-top: 12px; margin-bottom: 2px; color: #a0c4ff; }
    .version { font-size: 0.65rem; color: #555; margin-bottom: 10px; }

    #status-circle {
      width: 130px; height: 130px;
      border-radius: 50%; border: 4px solid #444;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin-bottom: 10px;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    #status-circle.idle        { background: #2d2d4e; border-color: #555; }
    #status-circle.calibrating { background: #2d4a2d; border-color: #4caf50; }
    #status-circle.watching    { background: #1e3a5f; border-color: #2196f3; }
    #status-circle.detected    { background: #5f1e1e; border-color: #f44336; }
    #status-circle.count1 { background: #1e3a2a; border-color: #8bc34a; }
    #status-circle.count2 { background: #3a2a1e; border-color: #ff9800; }
    #status-circle.count3 { background: #5f1e1e; border-color: #f44336; }

    #status-icon  { font-size: 2.5rem; }
    #status-label { font-size: 0.8rem; margin-top: 4px; color: #aaa; }

    #message {
      font-size: 0.9rem; text-align: center;
      height: 2.6em; margin-bottom: 8px;
      color: #ccc; line-height: 1.6;
      flex-shrink: 0;
    }

    #level-bar-wrap { width: 100%; max-width: 320px; margin-bottom: 4px; flex-shrink: 0; }
    #level-label { font-size: 0.7rem; color: #888; margin-bottom: 3px; }
    #level-bar-bg { background: #333; border-radius: 4px; height: 8px; overflow: hidden; }
    #level-bar {
      height: 100%; width: 0%;
      background: #2196f3; border-radius: 4px;
      transition: width 0.1s, background 0.1s;
    }
    #level-bar.over { background: #f44336; }

    #sensitivity-wrap {
      width: 100%; max-width: 320px; margin-bottom: 8px; flex-shrink: 0;
    }
    #sensitivity-wrap .sens-header {
      font-size: 0.75rem; color: #aaa; margin-bottom: 4px;
    }
    #sensitivity { width: 100%; accent-color: #2196f3; }
    #sensitivity-wrap .ends {
      display: flex; justify-content: space-between;
      font-size: 0.62rem; color: #555; margin-top: 2px;
    }
    #sensitivity-val { font-size: 0.7rem; color: #2196f3; text-align: center; margin-top: 2px; }

    #btn-row1 { display: flex; margin-bottom: 4px; flex-shrink: 0; }
    #btn-row2 { display: flex; gap: 8px; flex-shrink: 0; }

    button {
      padding: 12px 28px; font-size: 0.95rem;
      border: none; border-radius: 8px;
      cursor: pointer; background: #2196f3; color: #fff; margin: 4px;
    }
    button:disabled { background: #444; color: #777; cursor: default; }
    #stop-btn        { background: #f44336; }
    #recalibrate-btn { background: #555; font-size: 0.8rem; padding: 9px 18px; }
    #reset-btn       { background: #5a7a3a; font-size: 0.8rem; padding: 9px 18px; }

    #count-dots { display: flex; gap: 10px; margin: 8px 0; flex-shrink: 0; }
    .count-dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: #333; border: 2px solid #444;
      transition: background 0.3s, border-color 0.3s;
    }
    .count-dot.active-1 { background: #5a8a2a; border-color: #8bc34a; }
    .count-dot.active-2 { background: #8a5a1a; border-color: #ff9800; }
    .count-dot.active-3 { background: #8a1a1a; border-color: #f44336; }

    #alert-count  { font-size: 0.8rem; color: #888; flex-shrink: 0; }
    #calib-result { font-size: 0.72rem; color: #777; margin-top: 4px; line-height: 1.7; text-align: center; flex-shrink: 0; }
    #saved-info   { font-size: 0.65rem; color: #4a8; margin-top: 4px; flex-shrink: 0; }
    #wake-lock-status { font-size: 0.62rem; color: #3a3a5a; margin-top: 4px; flex-shrink: 0; }
  </style>
</head>
<body>
  <h1>独り言チェッカー</h1>
  <div class="version">v1.5.0</div>

  <div id="status-circle" class="idle">
    <div id="status-icon">🎤</div>
    <div id="status-label">待機中</div>
  </div>

  <div id="message">「開始」を押して<br>キャリブレーションを始めてください</div>

  <div id="level-bar-wrap">
    <div id="level-label">音量レベル</div>
    <div id="level-bar-bg"><div id="level-bar"></div></div>
  </div>
  <div id="threshold-info">閾値: —</div>

  <div id="sensitivity-wrap">
    <div class="sens-header"><span>感度調整</span></div>
    <input type="range" id="sensitivity" min="1" max="7" step="1" value="4">
    <div class="ends"><span>鈍感（誤検知を減らす）</span><span>敏感（小声も検出）</span></div>
    <div id="sensitivity-val">標準</div>
  </div>

  <div id="btn-row1">
    <button id="start-btn">開始</button>
    <button id="stop-btn" disabled>停止</button>
  </div>
  <div id="btn-row2">
    <button id="recalibrate-btn" disabled>再キャリブレーション</button>
    <button id="reset-btn">設定リセット</button>
  </div>

  <div id="count-dots"></div>
  <div id="alert-count">アラート回数: 0</div>
  <div id="calib-result"></div>
  <div id="saved-info"></div>
  <div id="wake-lock-status"></div>

<script>
// ---- 定数 ----
const NOISE_SEC         = 4;
const VOICE_SEC         = 5;
const SPEECH_HOLD_MS    = 1200;
const ALERT_COOLDOWN_MS = 5000;
const STORAGE_KEY       = 'hitorigoto_calib';
const SENSITIVITY_KEY   = 'hitorigoto_sensitivity';
// ピッチ検出の対象範囲（人の声の基本周波数）
const PITCH_MIN_HZ      = 75;
const PITCH_MAX_HZ      = 350;
// キャリブレーションしたピッチへの許容マージン（Hz）
const PITCH_MARGIN_HZ   = 80;

// 断続発声検出
const SPEECH_WINDOW_MS  = 5000; // 判定ウィンドウ（5秒）
const SPEECH_MIN_SEG_MS = 150;  // 1回の発声の最小継続時間（ms）
const SPEECH_COUNT_ALERT = 3;   // この回数以上でアラート

// 感度スライダー値 → 閾値乗数（1=鈍感×2.0、4=標準×1.0、7=敏感×0.4）
function sensitivityMultiplier(v) {
  return 2.0 - (v - 1) * (1.6 / 6);
}
const SENSITIVITY_LABELS = {
  1:'かなり鈍感', 2:'鈍感', 3:'やや鈍感',
  4:'標準', 5:'やや敏感', 6:'敏感', 7:'かなり敏感'
};

// ---- 状態 ----
let audioCtx = null, analyser = null, micStream = null;
let loopTimer = null, calibTimer = null, beepCtx = null;
let noiseFloor = 0, threshold = 0;
let voicePitchMean = 0;   // キャリブ済みピッチ（Hz）
let segmentStart = null;       // 現在の発声セグメント開始時刻
let speechSegments = [];       // 過去セグメント [{end, duration}]
let lastAlertTime = 0, alertCount = 0;
let calibStep = null;     // 'noise' | 'voice' | null
let noiseSamples = [], voicePitchSamples = [], voiceEnergySamples = [];
let phase = 'idle';

// ---- DOM ----
const circle         = document.getElementById('status-circle');
const icon           = document.getElementById('status-icon');
const labelEl        = document.getElementById('status-label');
const message        = document.getElementById('message');
const levelBar       = document.getElementById('level-bar');
const threshInfo     = document.getElementById('threshold-info');
const startBtn       = document.getElementById('start-btn');
const stopBtn        = document.getElementById('stop-btn');
const recalibBtn     = document.getElementById('recalibrate-btn');
const resetBtn       = document.getElementById('reset-btn');
const alertCountEl   = document.getElementById('alert-count');
const savedInfoEl    = document.getElementById('saved-info');
const debugEl        = document.getElementById('debug-info');
const sensitivityEl   = document.getElementById('sensitivity');
const sensitivityVal  = document.getElementById('sensitivity-val');
const countDotsEl     = document.getElementById('count-dots');
const calibResultEl   = document.getElementById('calib-result');
const wakeLockStatusEl = document.getElementById('wake-lock-status');

// ---- localStorage ----
function saveCalib() {
  const data = {
    noiseFloor, threshold, voicePitchMean,
    savedAt: new Date().toLocaleString('ja-JP')
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  savedInfoEl.textContent = `保存済み: ${data.savedAt}`;
}

function loadCalib() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// ---- ビープ音 ----
function beep(freq = 880, dur = 0.25, vol = 0.6) {
  if (!beepCtx) beepCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = beepCtx.createOscillator();
  const gain = beepCtx.createGain();
  osc.connect(gain);
  gain.connect(beepCtx.destination);
  osc.frequency.value = freq;
  osc.type = 'sine';
  gain.gain.setValueAtTime(vol, beepCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, beepCtx.currentTime + dur);
  osc.start(beepCtx.currentTime);
  osc.stop(beepCtx.currentTime + dur);
}

// ---- UI ----
function setPhaseUI(p, msg) {
  phase = p;
  circle.className = p;
  const icons  = { idle:'🎤', calibrating:'⏳', watching:'👁', detected:'⚠️' };
  const labels = { idle:'待機中', calibrating:'キャリブ中', watching:'監視中', detected:'発話検出！' };
  icon.textContent    = icons[p]  || '🎤';
  labelEl.textContent = labels[p] || '';
  if (msg !== undefined) message.textContent = msg;
}

function effectiveThreshold() {
  return threshold * sensitivityMultiplier(parseInt(sensitivityEl.value));
}

// ---- Wake Lock ----
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) {
    wakeLockStatusEl.textContent = '※ このブラウザはスクリーン常時点灯に非対応です';
    return;
  }
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLockStatusEl.textContent = '画面常時点灯：有効';
    wakeLock.addEventListener('release', () => {
      wakeLockStatusEl.textContent = '画面常時点灯：解除されました';
    });
  } catch (e) {
    wakeLockStatusEl.textContent = '画面常時点灯：取得できませんでした';
  }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  wakeLockStatusEl.textContent = '';
}

// 画面が非表示→再表示されたとき再取得
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && wakeLock === null && phase !== 'idle') {
    await requestWakeLock();
  }
});

// ---- カウントドット ----
function initDots() {
  countDotsEl.innerHTML = '';
  for (let i = 0; i < SPEECH_COUNT_ALERT; i++) {
    const dot = document.createElement('div');
    dot.className = 'count-dot';
    dot.id = `dot-${i}`;
    countDotsEl.appendChild(dot);
  }
}

function updateCountUI(count) {
  if (phase !== 'watching' && phase !== 'detected') return;
  // サークルの色
  const colorClass = count === 0 ? 'watching'
    : count === 1 ? 'count1'
    : count === 2 ? 'count2'
    : 'count3';
  circle.className = colorClass;

  // ドットの色
  const dotClass = count === 1 ? 'active-1' : count === 2 ? 'active-2' : 'active-3';
  for (let i = 0; i < SPEECH_COUNT_ALERT; i++) {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) continue;
    dot.className = 'count-dot' + (i < count ? ` ${dotClass}` : '');
  }
}

function updateThreshInfo() {
  // 閾値バーの表示（数値は内部的に使うが、UIには出さない）
  threshInfo.textContent = '';
}

function updateCalibResult() {
  const noiseLabel = noiseFloor < 0.01 ? '静か' : noiseFloor < 0.03 ? 'やや静か' : 'やや騒がしい';
  const pitchLabel = voicePitchMean > 0
    ? `${Math.round(voicePitchMean)}Hz付近` : '未取得（音量のみで判定）';
  const voiceGap = threshold - noiseFloor;
  const qualityLabel = voiceGap > noiseFloor * 2 ? 'しっかり取れました' :
                       voiceGap > noiseFloor      ? 'まずまず取れました' : '取得が不十分かもしれません';
  calibResultEl.textContent =
    `環境音：${noiseLabel}　声：${qualityLabel}\nピッチ：${pitchLabel}`;
}

// ---- ピッチ検出（FFT周波数データから） ----
function detectPitch(freqData, sampleRate, fftSize) {
  const binSize = sampleRate / fftSize;
  const minBin  = Math.max(1, Math.floor(PITCH_MIN_HZ / binSize));
  const maxBin  = Math.min(Math.floor(PITCH_MAX_HZ / binSize), freqData.length - 1);

  // 基本周波数帯のピーク探索
  let maxVal = 0, maxIdx = -1;
  for (let i = minBin; i <= maxBin; i++) {
    if (freqData[i] > maxVal) {
      maxVal = freqData[i];
      maxIdx = i;
    }
  }
  if (maxIdx < 0 || maxVal < 15) return null; // 信号が弱すぎる

  const pitchHz = maxIdx * binSize;

  // 倍音チェック（2倍・3倍の周波数にもエネルギーがあるか）
  const h2 = maxIdx * 2;
  const h3 = maxIdx * 3;
  const h2val = h2 < freqData.length ? freqData[h2] : 0;
  const h3val = h3 < freqData.length ? freqData[h3] : 0;
  const harmonicStrength = (h2val + h3val) / (maxVal * 2);

  return { pitchHz, maxVal, harmonicStrength };
}

// ---- キャリブレーション ----
function startCalibration() {
  noiseSamples       = [];
  voicePitchSamples  = [];
  voiceEnergySamples = [];
  calibStep = 'noise';
  setPhaseUI('calibrating', `静かにしてください…\n環境音を計測中（${NOISE_SEC}秒）`);

  let rem = NOISE_SEC;
  calibTimer = setInterval(() => {
    rem--;
    if (rem > 0) message.textContent = `静かにしてください…\n環境音を計測中（${rem}秒）`;
  }, 1000);

  setTimeout(() => {
    clearInterval(calibTimer);
    // 環境音ベースライン確定
    if (noiseSamples.length > 0) {
      const mean = noiseSamples.reduce((a, b) => a + b, 0) / noiseSamples.length;
      const max  = Math.max(...noiseSamples);
      noiseFloor = mean * 0.7 + max * 0.3;
    } else {
      noiseFloor = 0.005;
    }
    // 声フェーズへ
    calibStep = 'voice';
    setPhaseUI('calibrating', `今度は普通に話してください\n声を計測中（${VOICE_SEC}秒）`);
    let rem2 = VOICE_SEC;
    calibTimer = setInterval(() => {
      rem2--;
      if (rem2 > 0) message.textContent = `今度は普通に話してください\n声を計測中（${rem2}秒）`;
    }, 1000);
    setTimeout(() => {
      clearInterval(calibTimer);
      finishCalibration();
    }, VOICE_SEC * 1000);
  }, NOISE_SEC * 1000);
}

function finishCalibration() {
  calibStep = null;

  // 音量閾値
  const voiceEnergy = voiceEnergySamples.length > 0
    ? voiceEnergySamples.reduce((a, b) => a + b, 0) / voiceEnergySamples.length : 0;
  if (voiceEnergy > noiseFloor * 1.5) {
    threshold = noiseFloor + (voiceEnergy - noiseFloor) * 0.35;
  } else {
    threshold = Math.max(noiseFloor * 4.0, 0.005);
  }

  // ピッチ（外れ値を除いた中央付近の平均）
  if (voicePitchSamples.length > 5) {
    const sorted = [...voicePitchSamples].sort((a, b) => a - b);
    const trim   = Math.floor(sorted.length * 0.2);
    const core   = sorted.slice(trim, sorted.length - trim);
    voicePitchMean = core.reduce((a, b) => a + b, 0) / core.length;
  } else {
    voicePitchMean = 0; // ピッチが取れなかった場合は音量のみで判定
  }

  updateThreshInfo();
  updateCalibResult();
  saveCalib();
  initDots();
  setPhaseUI('watching', '監視中です\n独り言を検出したらアラートします');

}

// ---- 解析ループ ----
function startLoop() {
  const timeData = new Uint8Array(analyser.fftSize);
  const freqData = new Uint8Array(analyser.frequencyBinCount);
  let loopCount  = 0;

  loopTimer = setInterval(() => {
    loopCount++;
    analyser.getByteTimeDomainData(timeData);
    analyser.getByteFrequencyData(freqData);

    // 時間領域RMSエネルギー
    let sum = 0;
    for (let i = 0; i < timeData.length; i++) {
      const v = (timeData[i] - 128) / 128;
      sum += v * v;
    }
    const energy = Math.sqrt(sum / timeData.length);

    // ピッチ検出
    const pitchResult = detectPitch(freqData, audioCtx.sampleRate, analyser.fftSize);

    // バー更新（有効閾値基準）
    const eff = effectiveThreshold();
    const ref  = eff > 0 ? eff * 1.5 : 0.01;
    levelBar.style.width = Math.min(energy / ref * 100, 100) + '%';

    // 声判定：音量 AND ピッチ（ピッチキャリブ済みの場合）
    const energyOk = energy > eff;
    let voiceOk = energyOk;
    if (energyOk && voicePitchMean > 0 && pitchResult) {
      const pitchDiff = Math.abs(pitchResult.pitchHz - voicePitchMean);
      voiceOk = pitchDiff <= PITCH_MARGIN_HZ && pitchResult.harmonicStrength > 0.15;
    }
    levelBar.className = voiceOk ? 'over' : '';

    // デバッグ（発声累計は検出ロジック内で更新）

    // キャリブレーション中はサンプル蓄積
    if (phase === 'calibrating') {
      if (calibStep === 'noise') {
        noiseSamples.push(energy);
      } else if (calibStep === 'voice') {
        voiceEnergySamples.push(energy);
        if (pitchResult && pitchResult.harmonicStrength > 0.1) {
          voicePitchSamples.push(pitchResult.pitchHz);
        }
      }
      return;
    }
    if (phase !== 'watching' && phase !== 'detected') return;

    // 発話検出（断続発声対応）
    const now = Date.now();
    if (voiceOk) {
      if (!segmentStart) segmentStart = now;
    } else {
      if (segmentStart) {
        const dur = now - segmentStart;
        if (dur >= SPEECH_MIN_SEG_MS) {
          speechSegments.push({ end: now, duration: dur });
        }
        segmentStart = null;
      }
    }

    // ウィンドウ外のセグメントを削除
    speechSegments = speechSegments.filter(s => now - s.end < SPEECH_WINDOW_MS);

    // ウィンドウ内の発声回数
    const count = speechSegments.length;
    updateCountUI(count);


    if (count >= SPEECH_COUNT_ALERT && now - lastAlertTime > ALERT_COOLDOWN_MS) {
      lastAlertTime  = now;
      segmentStart   = null;
      speechSegments = [];
      alertCount++;
      alertCountEl.textContent = `アラート回数: ${alertCount}`;
      beep(880, 0.15);
      setTimeout(() => beep(880, 0.15), 180);
      setTimeout(() => beep(1100, 0.2), 360);
      setPhaseUI('detected', '⚠️ 独り言を検出しました');
      setTimeout(() => {
        if (phase === 'detected')
          setPhaseUI('watching', '監視中です\n独り言を検出したらアラートします');
      }, 3000);
    }
  }, 100);
}

// ---- 感度スライダー ----
sensitivityEl.addEventListener('input', () => {
  const v = parseInt(sensitivityEl.value);
  sensitivityVal.textContent = SENSITIVITY_LABELS[v];
  localStorage.setItem(SENSITIVITY_KEY, v);
  if (threshold > 0) updateThreshInfo();
});

// ---- 起動時チェック ----
window.addEventListener('load', () => {
  const savedSens = localStorage.getItem(SENSITIVITY_KEY);
  if (savedSens) sensitivityEl.value = savedSens;
  sensitivityVal.textContent = SENSITIVITY_LABELS[parseInt(sensitivityEl.value)];

  const saved = loadCalib();
  if (saved) {
    savedInfoEl.textContent = `前回の設定: ${saved.savedAt}`;
    message.textContent = '前回の設定を読み込めます\n「開始」を押してください';
  }
});

// ---- 開始 ----
startBtn.addEventListener('click', async () => {
  try {
    beepCtx = new (window.AudioContext || window.webkitAudioContext)();
    await beepCtx.resume();

    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      video: false
    });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;

    const source = audioCtx.createMediaStreamSource(micStream);
    source.connect(analyser);
    const silentGain = audioCtx.createGain();
    silentGain.gain.value = 0;
    analyser.connect(silentGain);
    silentGain.connect(audioCtx.destination);

    startBtn.disabled   = true;
    stopBtn.disabled    = false;
    recalibBtn.disabled = false;

    await requestWakeLock();
    startLoop();

    const saved = loadCalib();
    if (saved) {
      noiseFloor     = saved.noiseFloor;
      threshold      = saved.threshold;
      voicePitchMean = saved.voicePitchMean || 0;
      updateThreshInfo();
      updateCalibResult();
      initDots();
      setPhaseUI('watching', '前回の設定で監視中です\n独り言を検出したらアラートします');
    } else {
      startCalibration();
    }
  } catch (e) {
    message.textContent = 'マイクへのアクセスが拒否されました。\nブラウザの設定を確認してください。';
    debugEl.textContent = 'エラー: ' + e.message;
  }
});

// ---- 停止 ----
stopBtn.addEventListener('click', () => {
  clearInterval(loopTimer);
  clearInterval(calibTimer);
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx)  audioCtx.close();
  audioCtx = analyser = micStream = null;
  segmentStart = null;
  speechSegments = [];
  releaseWakeLock();
  startBtn.disabled   = false;
  stopBtn.disabled    = true;
  recalibBtn.disabled = true;
  levelBar.style.width = '0%';
  threshInfo.textContent = '閾値: —';
  setPhaseUI('idle', '「開始」を押して\nキャリブレーションを始めてください');
});

// ---- 再キャリブレーション ----
recalibBtn.addEventListener('click', () => {
  if (phase === 'watching' || phase === 'detected') {
    speechStart = null;
    startCalibration();
  }
});

// ---- 設定リセット ----
resetBtn.addEventListener('click', () => {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(SENSITIVITY_KEY);
  noiseFloor = 0; threshold = 0; voicePitchMean = 0;
  sensitivityEl.value = 4;
  sensitivityVal.textContent = SENSITIVITY_LABELS[4];
  savedInfoEl.textContent = '';
  threshInfo.textContent  = '閾値: —';
  message.textContent = phase === 'idle'
    ? '設定をリセットしました\n「開始」でキャリブレーションを行います'
    : '設定をリセットしました\n「再キャリブレーション」で再設定できます';
});

// ---- サービスワーカー登録 ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
